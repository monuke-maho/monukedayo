content:
  - name: blog
    label: Blog
    type: collection
    path: content/blog
    format: md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: string
        required: true
      - name: date
        label: Date
        type: date
        required: true
      - name: emoji
        label: Emoji
        type: string
        default: "🍜"
      - name: tags
        label: Tags
        type: list
        field:
          type: string
      - name: published
        label: Published
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
